name: Specmatic Tests

on:
  push:
  pull_request:

env:
  SPECMATIC_IMAGE: specmatic/specmatic:latest

jobs:
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Start backend services
        working-directory: ./server
        env:
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: |
          docker compose -f docker-compose.test.yml up -d
          echo "Containers started, waiting for readiness..."
          echo "Docker network: $(docker network ls | grep aimoneymentor)"

      - name: Wait for services to be healthy
        env:
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/60: Got HTTP $STATUS, waiting..."
            sleep 2
          done
          echo "✗ Backend failed to respond"
          echo "=== Docker Compose Logs =="
          docker compose -f ./server/docker-compose.test.yml logs --tail=100
          echo ""
          echo "=== Docker Networks ==="
          docker network ls
          exit 1

      - name: Configure Specmatic license
        env:
          SPECMATIC_LICENSE_TEXT: ${{ secrets.SPECMATIC_LICENSE }}
        run: |
          if [ -n "$SPECMATIC_LICENSE_TEXT" ]; then
            mkdir -p specmatic
            printf '%s' "$SPECMATIC_LICENSE_TEXT" > specmatic/specmatic-license.txt
            echo "SPECMATIC_LICENSE_FILE=$PWD/specmatic/specmatic-license.txt" >> "$GITHUB_ENV"
          fi

      - name: Verify Specmatic Docker image
        run: docker run --rm "$SPECMATIC_IMAGE" --version

      - name: Run contract tests
        env:
          APP_URL: http://localhost:5000
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: bash scripts/run-specmatic-mode.sh none

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-contract-report
          path: reports/none/

  positive-resiliency-tests:
    name: Positive Resiliency Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Start backend services
        working-directory: ./server
        env:
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: |
          docker compose -f docker-compose.test.yml up -d
          echo "Containers started, waiting for readiness..."
          echo "Docker network: $(docker network ls | grep aimoneymentor)"

      - name: Wait for services to be healthy
        env:
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/60: Got HTTP $STATUS, waiting..."
            sleep 2
          done
          echo "✗ Backend failed to respond"
          echo "=== Docker Compose Logs =="
          docker compose -f ./server/docker-compose.test.yml logs --tail=100
          echo ""
          echo "=== Docker Networks ==="
          docker network ls
          exit 1

      - name: Configure Specmatic license
        env:
          SPECMATIC_LICENSE_TEXT: ${{ secrets.SPECMATIC_LICENSE }}
        run: |
          if [ -n "$SPECMATIC_LICENSE_TEXT" ]; then
            mkdir -p specmatic
            printf '%s' "$SPECMATIC_LICENSE_TEXT" > specmatic/specmatic-license.txt
            echo "SPECMATIC_LICENSE_FILE=$PWD/specmatic/specmatic-license.txt" >> "$GITHUB_ENV"
          fi

      - name: Verify Specmatic Docker image
        run: docker run --rm "$SPECMATIC_IMAGE" --version

      - name: Run positive only resiliency tests
        env:
          APP_URL: http://localhost:5000
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: bash scripts/run-specmatic-mode.sh positiveOnly

      - name: Upload positive resiliency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-positive-resiliency-report
          path: reports/positiveOnly/

  full-resiliency-tests:
    name: Full Resiliency Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Start backend services
        working-directory: ./server
        env:
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: |
          docker compose -f docker-compose.test.yml up -d
          echo "Containers started, waiting for readiness..."
          echo "Docker network: $(docker network ls | grep aimoneymentor)"

      - name: Wait for services to be healthy
        env:
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/60: Got HTTP $STATUS, waiting..."
            sleep 2
          done
          echo "✗ Backend failed to respond"
          echo "=== Docker Compose Logs =="
          docker compose -f ./server/docker-compose.test.yml logs --tail=100
          echo ""
          echo "=== Docker Networks ==="
          docker network ls
          exit 1

      - name: Configure Specmatic license
        env:
          SPECMATIC_LICENSE_TEXT: ${{ secrets.SPECMATIC_LICENSE }}
        run: |
          if [ -n "$SPECMATIC_LICENSE_TEXT" ]; then
            mkdir -p specmatic
            printf '%s' "$SPECMATIC_LICENSE_TEXT" > specmatic/specmatic-license.txt
            echo "SPECMATIC_LICENSE_FILE=$PWD/specmatic/specmatic-license.txt" >> "$GITHUB_ENV"
          fi

      - name: Verify Specmatic Docker image
        run: docker run --rm "$SPECMATIC_IMAGE" --version

      - name: Run full resiliency tests
        env:
          APP_URL: http://localhost:5000
          COMPOSE_PROJECT_NAME: aimoneymentor
        run: bash scripts/run-specmatic-mode.sh all

      - name: Upload full resiliency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-full-resiliency-report
          path: reports/all/
