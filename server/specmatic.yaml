version: 3

systemUnderTest:
  service:
    definitions:
      - definition:
          specPath: ./specs/openapi.yaml
    runOptions:
      openapi:
        type: test
        baseUrl: "${APP_URL:http://localhost:5000}"
    data:
      examples:
        - directories:
            - ./examples

specmatic:
  settings:
    test:
      strictMode: true
      schemaResiliencyTests: none
      requestTimeout: 5000
